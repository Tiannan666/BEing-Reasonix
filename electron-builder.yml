appId: com.being.reasonix
productName: BEing Reasonix
copyright: MIT

directories:
  output: release
  buildResources: assets

extraResources:
  - from: vendor/node/
    to: vendor/node/
  - from: vendor/node-installer/
    to: vendor/node-installer/

asar: true


win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/being-mind.png
  artifactName: "BEing-Reasonix-Setup-${version}-win-x64.${ext}"
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BEing Reasonix
  include: scripts/installer.nsh

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/being-mind.png
  artifactName: "BEing-Reasonix-${version}-mac-${arch}.${ext}"
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  title: "BEing Reasonix ${version}"
  icon: assets/being-mind.png
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/being-mind.png
  category: Development
